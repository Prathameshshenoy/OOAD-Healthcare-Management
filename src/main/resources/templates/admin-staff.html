<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Staff | MedCare Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            overflow: hidden;
            padding: 2rem;
        }
        
        /* Red Accent Icon Box for Staff Module */
        .icon-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: #fceae9;
            color: #e74c3c;
            margin-bottom: 15px;
            font-size: 28px;
        }

        /* Modern Table Styling */
        .table { margin-bottom: 0; }
        .table thead th {
            background-color: #f8f9fa;
            color: #495057;
            font-weight: 600;
            border-bottom: 2px solid #e9ecef;
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .table tbody td { 
            padding: 15px; 
            vertical-align: middle; 
            font-size: 0.95rem;
        }
        
        /* Badges */
        .role-badge { padding: 6px 12px; font-weight: 600; letter-spacing: 0.5px; font-size: 0.8rem; }
        .status-badge { padding: 8px 12px; font-weight: 500; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/dashboard"><i class="bi bi-hospital me-2"></i>MedCare Pro</a>
            <div class="ms-auto">
                <a href="/dashboard" class="btn btn-outline-light btn-sm rounded-pill px-4">
                    <i class="bi bi-house-door me-2"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        
        <div class="row mb-4">
            <div class="col-12 text-center">
                <div class="icon-box">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h2 class="fw-bold text-dark mb-1">Manage Staff Accounts</h2>
                <p class="text-muted">Review, activate, or suspend system access for hospital personnel.</p>
            </div>
        </div>

        <div class="card glass-card p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle text-center">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th class="text-start">Name</th>
                            <th class="text-start">Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td class="fw-bold text-secondary" th:text="'#' + ${user.id}"></td>
                            
                            <td class="text-start fw-semibold text-dark" th:text="${user.name}"></td>
                            
                            <td class="text-start text-muted" th:text="${user.email}"></td>
                            
                            <td>
                                <span class="badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25 role-badge rounded-pill" th:text="${user.role}"></span>
                            </td>
                            
                            <td>
                                <span class="badge rounded-pill bg-success bg-opacity-10 text-success border border-success border-opacity-25 status-badge" th:if="${user.status == 'Active'}">
                                    <i class="bi bi-check-circle-fill me-1"></i>Active
                                </span>
                                <span class="badge rounded-pill bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 status-badge" th:if="${user.status == 'Inactive'}">
                                    <i class="bi bi-x-circle-fill me-1"></i>Inactive
                                </span>
                            </td>
                            
                            <td>
                                <form method="post" action="/admin/staff/deactivate" th:if="${user.status == 'Active'}" class="m-0">
                                    <input type="hidden" name="userId" th:value="${user.id}" />
                                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3 shadow-sm fw-semibold">
                                        <i class="bi bi-person-x me-1"></i>Deactivate
                                    </button>
                                </form>
                                <form method="post" action="/admin/staff/reactivate" th:if="${user.status == 'Inactive'}" class="m-0">
                                    <input type="hidden" name="userId" th:value="${user.id}" />
                                    <button type="submit" class="btn btn-sm btn-outline-success rounded-pill px-3 shadow-sm fw-semibold">
                                        <i class="bi bi-person-check me-1"></i>Reactivate
                                    </button>
                                </form>
                            </td>
                        </tr>
                        
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-people display-4 d-block mb-3 text-light"></i>
                                No staff accounts found in the system.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
    </div>

</body>
</html>

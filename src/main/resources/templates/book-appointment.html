<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Appointment | MedCare Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
        }
        .form-floating > label { color: #6c757d; }
        
        .form-control:focus, .form-select:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 0 0.25rem rgba(74, 144, 226, 0.15);
        }

        .btn-primary {
            background-color: #4a90e2;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2);
        }
        .btn-primary:hover { 
            background-color: #357abd; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 15px rgba(74, 144, 226, 0.35);
        }
        
        .icon-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 65px;
            height: 65px;
            border-radius: 16px;
            background: #eef2f7;
            color: #4a90e2;
            margin-bottom: 20px;
            font-size: 32px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/dashboard"><i class="bi bi-hospital me-2"></i>MedCare Pro</a>
            <div class="ms-auto">
                <a href="/dashboard" class="btn btn-outline-light btn-sm rounded-pill px-4">
                    <i class="bi bi-house-door me-2"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card glass-card">
                    <div class="text-center mb-4">
                        <div class="icon-box">
                            <i class="bi bi-calendar-plus"></i>
                        </div>
                        <h3 class="fw-bold text-dark mb-1">Schedule Appointment</h3>
                        <p class="text-muted small">Select your preferred time slot below</p>
                    </div>
                    
                    <div class="card-body p-0">
                        <div th:if="${successMessage}" class="alert alert-success border-0 rounded-3 shadow-sm" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
                        </div>
                        <div th:if="${errorMessage}" class="alert alert-danger border-0 rounded-3 shadow-sm" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
                        </div>

                        <form action="/appointments/book" method="post">
                            
                            <div class="form-floating mb-3">
                                <select class="form-select" id="doctorId" name="doctorId" required>
                                    <option value="" selected disabled>Choose a specialist...</option>
                                    <option th:each="doc : ${doctors}" 
                                            th:value="${doc.id}" 
                                            th:text="'Dr. ' + ${doc.name}">
                                    </option>
                                </select>
                                <label for="doctorId"><i class="bi bi-heart-pulse me-2"></i>Select Doctor</label>
                            </div>
                            
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input type="date" class="form-control" id="date" name="date" required>
                                        <label for="date"><i class="bi bi-calendar-event me-2"></i>Date</label>
                                    </div>
                                </div>
                                
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <select class="form-select" id="time" name="time" required>
                                            <option value="" selected disabled>Choose time...</option>
                                            <optgroup label="Morning Session">
                                                <option value="09:00">09:00 AM</option>
                                                <option value="09:30">09:30 AM</option>
                                                <option value="10:00">10:00 AM</option>
                                                <option value="10:30">10:30 AM</option>
                                                <option value="11:00">11:00 AM</option>
                                                <option value="11:30">11:30 AM</option>
                                            </optgroup>
                                            <optgroup label="Afternoon Session">
                                                <option value="13:00">01:00 PM</option>
                                                <option value="13:30">01:30 PM</option>
                                                <option value="14:00">02:00 PM</option>
                                                <option value="14:30">02:30 PM</option>
                                                <option value="15:00">03:00 PM</option>
                                                <option value="15:30">03:30 PM</option>
                                                <option value="16:00">04:00 PM</option>
                                                <option value="16:30">04:30 PM</option>
                                            </optgroup>
                                        </select>
                                        <label for="time"><i class="bi bi-clock me-2"></i>Time Slot</label>
                                    </div>
                                </div>
                            </div>

                            <div class="d-grid mt-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-calendar-check me-2"></i>Confirm Booking
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const doctorSelect = document.getElementById("doctorId");
            const dateInput = document.getElementById("date");
            const timeSelect = document.getElementById("time");

            // Set minimum date to tomorrow — no booking on today or past dates
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            dateInput.min = tomorrow.toISOString().split("T")[0];
            
            const timeOptions = Array.from(timeSelect.options).filter(opt => opt.value !== "");

            function fetchBookedTimes() {
                const doctorId = doctorSelect.value;
                const date = dateInput.value;

                timeOptions.forEach(opt => {
                    opt.disabled = false;
                    
                    // Keep original AM/PM text formatting, just strip any previous "(Booked)" tags
                    opt.text = opt.text.replace(" (Booked)", ""); 
                });

                if (doctorId && date) {
                    fetch(`/appointments/api/booked-times?doctorId=${doctorId}&date=${date}`)
                        .then(response => response.json())
                        .then(bookedTimes => {
                            timeOptions.forEach(opt => {
                                if (bookedTimes.includes(opt.value)) {
                                    opt.disabled = true;
                                    opt.text = opt.text + " (Booked)";
                                }
                            });
                        })
                        .catch(error => console.error("Error fetching times:", error));
                }
            }

            doctorSelect.addEventListener("change", fetchBookedTimes);
            dateInput.addEventListener("change", fetchBookedTimes);
        });
    </script>
</body>
</html>

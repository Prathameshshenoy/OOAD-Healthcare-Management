<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Medical History (EHR) | MedCare Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 3rem;
        }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            height: 100%;
        }

        /* Green Accent Icon Box for Patient Module */
        .icon-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: #eafaf1;
            color: #2ecc71;
            margin-bottom: 15px;
            font-size: 28px;
        }

        /* Clinical Timeline Record Card */
        .record-card {
            background-color: #ffffff;
            border: 1px solid #e9ecef;
            border-left: 5px solid #2ecc71;
            transition: all 0.2s ease;
        }
        .record-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transform: translateX(2px);
        }

        /* Form Styling */
        .form-floating > label { color: #6c757d; }
        .form-control:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 0.25rem rgba(46, 204, 113, 0.15);
        }
        textarea.form-control { min-height: 120px; }

        /* Module Specific Green Button */
        .btn-theme-green {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }
        .btn-theme-green:hover { 
            background-color: #27ae60; 
            color: white;
            transform: translateY(-2px); 
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.35);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/dashboard"><i class="bi bi-hospital me-2"></i>MedCare Pro</a>
            <div class="ms-auto d-flex gap-2">
                <a th:href="@{/patients/{id}/profile(id=${patient.patientId})}" class="btn btn-outline-light btn-sm rounded-pill px-3">
                    <i class="bi bi-person-badge me-1"></i>Patient Profile
                </a>
                <a href="/patients/search" class="btn btn-outline-light btn-sm rounded-pill px-3">
                    <i class="bi bi-search me-1"></i>Search
                </a>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <div class="row mb-4">
            <div class="col-12 text-center">
                <div class="icon-box">
                    <i class="bi bi-clipboard2-pulse"></i>
                </div>
                <h2 class="fw-bold text-dark mb-1">Electronic Health Records</h2>
                <p class="text-muted fw-medium" th:text="'Patient: ' + ${patient.name} + ' (ID: #' + ${patient.patientId} + ')'"></p>
            </div>
        </div>

        <div class="row justify-content-center mb-4" th:if="${successMessage}">
            <div class="col-12 col-lg-10">
                <div class="alert alert-success border-0 rounded-3 shadow-sm mb-0" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
                </div>
            </div>
        </div>

        <div class="row g-4 justify-content-center">
            
            <div class="col-lg-6 col-md-12">
                <div class="card glass-card">
                    <h5 class="fw-bold text-dark mb-4 border-bottom pb-3">
                        <i class="bi bi-clock-history text-muted me-2"></i>Past Consultations
                    </h5>
                    
                    <div th:if="${#lists.isEmpty(medicalRecords)}" class="text-center py-5">
                        <i class="bi bi-folder2-open display-4 text-secondary opacity-50 mb-3 d-block"></i>
                        <p class="text-muted fw-medium mb-0">No medical records found for this patient.</p>
                    </div>

                    <div class="d-flex flex-column gap-3">
                        <div th:each="record : ${medicalRecords}" class="record-card rounded-3 p-3 shadow-sm">
                            
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge bg-light text-secondary border px-2 py-1">
                                    <i class="bi bi-calendar-event me-1"></i><span th:text="${record.recordDate}"></span>
                                </span>
                                <span class="badge bg-secondary bg-opacity-10 text-secondary" th:if="${record.linkedAppointmentId}" th:text="'Appt #' + ${record.linkedAppointmentId}"></span>
                            </div>
                            
                            <div class="mb-2">
                                <span class="fw-semibold text-dark">Notes: </span>
                                <span class="text-muted" th:text="${record.consultationNotes}"></span>
                            </div>
                            
                            <div th:if="${record.allergies} and ${record.allergies != ''}">
                                <span class="badge bg-warning bg-opacity-10 text-warning-emphasis border border-warning border-opacity-25 px-2 py-1">
                                    <i class="bi bi-exclamation-triangle-fill me-1"></i>Allergies: <span th:text="${record.allergies}"></span>
                                </span>
                            </div>
                            
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-12">
                <div class="card glass-card">
                    <h5 class="fw-bold text-dark mb-4 border-bottom pb-3">
                        <i class="bi bi-file-earmark-plus text-muted me-2"></i>Add New Record
                    </h5>
                    
                    <form method="post" th:action="@{/patients/{id}/record(id=${patient.patientId})}">
                        
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" id="linkedAppointmentId" name="linkedAppointmentId" placeholder="Appt ID">
                            <label for="linkedAppointmentId"><i class="bi bi-link-45deg me-1"></i>Linked Appt ID (Optional)</label>
                        </div>
                        
                        <div class="form-floating mb-3">
                            <textarea class="form-control" id="consultationNotes" name="consultationNotes" placeholder="Enter notes..." required></textarea>
                            <label for="consultationNotes"><i class="bi bi-card-text me-1"></i>Consultation Notes</label>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="text" class="form-control" id="allergies" name="allergies" placeholder="e.g. Penicillin">
                            <label for="allergies"><i class="bi bi-virus me-1"></i>Allergies (Optional)</label>
                        </div>

                        <div class="d-grid mt-2">
                            <button type="submit" class="btn btn-theme-green btn-lg">
                                <i class="bi bi-plus-circle me-2"></i>Append Record
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | MedCare Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 450px;
            padding: 3rem 2.5rem;
        }
        .form-floating > label { color: #6c757d; }
        
        /* Updated to sleek black/dark theme */
        .btn-dark-theme {
            background-color: #212529;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-dark-theme:hover { 
            background-color: #343a40; 
            color: white;
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .icon-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 65px;
            height: 65px;
            border-radius: 16px;
            background: #e9ecef; /* Soft gray background */
            color: #212529; /* Dark icon */
            margin-bottom: 20px;
            font-size: 32px;
        }
        .brand-text { color: #212529; font-weight: 800; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="text-center mb-4">
            <div class="icon-box">
                <i class="bi bi-hospital"></i>
            </div>
            <h2 class="brand-text mb-1">MedCare Pro</h2>
            <p class="text-muted">Sign in to your account</p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger border-0 rounded-3 shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${successMessage}" class="alert alert-success border-0 rounded-3 shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        </div>

        <form method="post" action="/login">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                <label for="email"><i class="bi bi-envelope me-2"></i>Email Address</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                <label for="password"><i class="bi bi-shield-lock me-2"></i>Password</label>
            </div>

            <button type="submit" class="btn btn-dark-theme w-100 mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted small">Don't have an account?</span> 
            <a href="/register" class="text-decoration-none fw-bold" style="color: #212529;">Register here</a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — Healthcare System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8;
               display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: white; padding: 2.5rem; border-radius: 12px;
                box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 100%; max-width: 420px; }
        h1 { color: #1a3c5e; margin-bottom: 0.25rem; font-size: 1.6rem; }
        p.subtitle { color: #666; margin-bottom: 1.8rem; font-size: 0.9rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600;
                color: #444; margin-bottom: 0.3rem; }
        input { width: 100%; padding: 0.65rem 0.9rem; border: 1px solid #ccd6e0;
                border-radius: 7px; font-size: 0.95rem; margin-bottom: 1.2rem; }
        input:focus { outline: none; border-color: #2980b9; }
        .btn { width: 100%; padding: 0.75rem; background: #2980b9; color: white;
               border: none; border-radius: 7px; font-size: 1rem;
               font-weight: 600; cursor: pointer; }
        .btn:hover { background: #1a6fa3; }
        .alert-error { background: #fdecea; color: #c0392b; border: 1px solid #e74c3c;
                       padding: 0.7rem 1rem; border-radius: 7px; margin-bottom: 1.2rem; }
        .alert-success { background: #eafaf1; color: #1e8449; border: 1px solid #27ae60;
                         padding: 0.7rem 1rem; border-radius: 7px; margin-bottom: 1.2rem; }
        .footer-link { text-align: center; margin-top: 1.3rem; font-size: 0.88rem; color: #666; }
        .footer-link a { color: #2980b9; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <h1>Healthcare System</h1>
    <p class="subtitle">Sign in to your account</p>

    <div class="alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
    <div class="alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <form method="post" action="/login">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />

        <button type="submit" class="btn">Sign In</button>
    </form>

    <div class="footer-link">
        Don't have an account? <a href="/register">Register here</a>
    </div>
</div>
</body>
</html>

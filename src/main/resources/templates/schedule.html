<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Schedule | MedCare Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> <!-- ← NEW -->
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            overflow: hidden;
            padding: 2rem;
        }
        .icon-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: #fdf3e8;
            color: #f39c12;
            margin-bottom: 15px;
            font-size: 28px;
        }
        .table { margin-bottom: 0; }
        .table thead th {
            background-color: #f8f9fa;
            color: #495057;
            font-weight: 600;
            border-bottom: 2px solid #e9ecef;
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .table tbody td {
            padding: 15px;
            vertical-align: middle;
            font-size: 0.95rem;
        }
        .status-badge { padding: 8px 12px; font-weight: 600; letter-spacing: 0.5px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/dashboard"><i class="bi bi-hospital me-2"></i>MedCare Pro</a>
            <div class="ms-auto">
                <a href="/dashboard" class="btn btn-outline-light btn-sm rounded-pill px-4">
                    <i class="bi bi-house-door me-2"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">

        <div class="row mb-4">
            <div class="col-12 text-center">
                <div class="icon-box">
                    <i class="bi bi-calendar-week"></i>
                </div>
                <h2 class="fw-bold text-dark mb-1"> Schedule</h2>
                <p class="text-muted" th:if="${assignedDoctorName != null}">Managing schedule for <strong th:text="${'Dr. ' + assignedDoctorName}"></strong></p>
                <p class="text-muted" th:if="${assignedDoctorName == null}">Manage patient appointments and daily availability.</p>
            </div>
        </div>

        <div th:if="${alertMessage != null}" class="alert alert-warning rounded-3 mb-4" th:text="${alertMessage}"></div>
        <div class="card glass-card p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle text-center">
                    <thead>
                        <tr>
                            <th>Ref ID</th>
                            <th>Patient</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th>Manage</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="appt : ${appointments}">
                            <td class="fw-bold text-primary" th:text="'#' + ${appt.id}"></td>

                            <td class="fw-semibold">
                                <span th:text="${patientNames != null and patientNames[appt.patientId] != null} ? ${patientNames[appt.patientId]} : 'Patient #' + ${appt.patientId}"></span>
                            </td>

                            <td>
                                <i class="bi bi-calendar2-day text-muted me-2"></i>
                                <span th:text="${appt.appointmentDate}" class="fw-medium text-dark"></span>
                            </td>

                            <td>
                                <i class="bi bi-clock text-muted me-2"></i>
                                <span th:text="${appt.appointmentTime}" class="fw-medium text-dark"></span>
                            </td>

                            <td>
                                <span class="badge rounded-pill bg-warning bg-opacity-10 text-warning-emphasis border border-warning border-opacity-25 status-badge"
                                      th:if="${appt.status == 'Pending'}">
                                    <i class="bi bi-hourglass-split me-1"></i>Pending
                                </span>
                                <span class="badge rounded-pill bg-success bg-opacity-10 text-success border border-success border-opacity-25 status-badge"
                                      th:if="${appt.status == 'Confirmed'}">
                                    <i class="bi bi-check-circle-fill me-1"></i>Confirmed
                                </span>
                                <span class="badge rounded-pill bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 status-badge"
                                      th:if="${appt.status == 'Cancelled'}">
                                    <i class="bi bi-x-circle-fill me-1"></i>Cancelled
                                </span>
                                <!-- ← NEW -->
                                <span class="badge rounded-pill bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 status-badge"
                                      th:if="${appt.status == 'Completed'}">
                                    <i class="bi bi-clipboard2-check-fill me-1"></i>Completed
                                </span>
                            </td>

                            <td>
                                <!-- Mark Complete — RECEPTIONIST / ADMIN only -->
                                <button th:if="${canManage and (appt.status == 'Confirmed' or appt.status == 'Pending')}"
                                        class="btn btn-sm btn-outline-primary rounded-pill px-3 shadow-sm fw-semibold me-1"
                                        th:onclick="markComplete([[${appt.id}]])">
                                    <i class="bi bi-clipboard2-check me-1"></i>Mark Complete
                                </button>

                                <!-- Cancel — RECEPTIONIST / ADMIN only -->
                                <form th:if="${canManage and (appt.status == 'Pending' or appt.status == 'Confirmed')}"
                                      action="/appointments/cancel" method="post" class="m-0 d-inline">
                                    <input type="hidden" name="appointmentId" th:value="${appt.id}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3 shadow-sm fw-semibold">
                                        <i class="bi bi-x-lg me-1"></i>Cancel
                                    </button>
                                </form>

                                <!-- Doctor view — read only -->
                                <span th:if="${!canManage and (appt.status == 'Pending' or appt.status == 'Confirmed')}" class="text-muted small">View only</span>

                                <span th:if="${appt.status == 'Cancelled' or appt.status == 'Completed'}"
                                      class="text-muted small fw-semibold">
                                    <i class="bi bi-dash-lg"></i>
                                </span>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(appointments)}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-calendar2-x display-4 d-block mb-3 text-light"></i>
                                No appointments found. Your schedule is clear!
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- ← NEW: Mark Complete script -->
    <script>
        /**
         * Prompts for the consultation fee, then calls POST /appointments/complete.
         * AppointmentService marks the appointment "Completed" and fires
         * billingService.onConsultationCompleted() to create the PENDING_PAYMENT bill.
         * The receptionist can then go to /billing/manage to collect payment.
         */
        function markComplete(appointmentId) {
            Swal.fire({
                title: 'Mark Consultation Complete',
                html: `
                    <p class="text-muted mb-3">Enter the consultation fee for appointment <strong>#${appointmentId}</strong>.</p>
                    <div class="input-group">
                        <span class="input-group-text">₹</span>
                        <input type="number" id="swal-fee" class="form-control"
                               placeholder="e.g. 1500" min="1" step="0.01" value="1500">
                    </div>`,
                showCancelButton:   true,
                confirmButtonText:  'Complete & Generate Bill',
                confirmButtonColor: '#0d6efd',
                preConfirm: () => {
                    const fee = parseFloat(document.getElementById('swal-fee').value);
                    if (!fee || fee <= 0) {
                        Swal.showValidationMessage('Please enter a valid fee greater than 0.');
                        return false;
                    }
                    return fee;
                }
            }).then(result => {
                if (!result.isConfirmed) return;

                const fee = result.value;

                Swal.fire({
                    title: 'Processing...',
                    allowOutsideClick: false,
                    didOpen: () => Swal.showLoading()
                });

                fetch('/appointments/complete', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ appointmentId: appointmentId, consultationFee: fee })
                })
                .then(async response => {
                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    return data;
                })
                .then(data => {
                    Swal.fire({
                        title: 'Done!',
                        html:  `${data.message}<br><br><a href="/billing/manage" class="btn btn-success btn-sm rounded-pill px-4"><i class="bi bi-cash-stack me-1"></i>Go to Billing</a>`,
                        icon:  'success'
                    }).then(() => location.reload());
                })
                .catch(error => {
                    Swal.fire('Error', error.message, 'error');
                });
            });
        }
    </script>

</body>
</html>

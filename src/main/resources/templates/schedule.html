<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Schedule | MedCare Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-brand { font-weight: 700; letter-spacing: 1px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            overflow: hidden;
            padding: 2rem;
        }

        /* Orange Accent Icon Box for Schedule Module */
        .icon-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: #fdf3e8;
            color: #f39c12;
            margin-bottom: 15px;
            font-size: 28px;
        }

        /* Modern Table Styling */
        .table { margin-bottom: 0; }
        .table thead th {
            background-color: #f8f9fa;
            color: #495057;
            font-weight: 600;
            border-bottom: 2px solid #e9ecef;
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .table tbody td { 
            padding: 15px; 
            vertical-align: middle; 
            font-size: 0.95rem;
        }
        
        /* Modern Opacity Badges */
        .status-badge { padding: 8px 12px; font-weight: 600; letter-spacing: 0.5px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/dashboard"><i class="bi bi-hospital me-2"></i>MedCare Pro</a>
            <div class="ms-auto">
                <a href="/dashboard" class="btn btn-outline-light btn-sm rounded-pill px-4">
                    <i class="bi bi-house-door me-2"></i>Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        
        <div class="row mb-4">
            <div class="col-12 text-center">
                <div class="icon-box">
                    <i class="bi bi-calendar-week"></i>
                </div>
                <h2 class="fw-bold text-dark mb-1">Daily Schedule</h2>
                <p class="text-muted">Manage patient appointments and daily availability.</p>
            </div>
        </div>

        <div class="card glass-card p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle text-center">
                    <thead>
                        <tr>
                            <th>Ref ID</th>
                            <th>Patient ID</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th>Manage</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="appt : ${appointments}">
                            <td class="fw-bold text-primary" th:text="'#' + ${appt.id}"></td>
                            
                            <td class="text-muted fw-semibold" th:text="${appt.patientId}"></td>
                            
                            <td>
                                <i class="bi bi-calendar2-day text-muted me-2"></i>
                                <span th:text="${appt.appointmentDate}" class="fw-medium text-dark"></span>
                            </td>
                            
                            <td>
                                <i class="bi bi-clock text-muted me-2"></i>
                                <span th:text="${appt.appointmentTime}" class="fw-medium text-dark"></span>
                            </td>
                            
                            <td>
                                <span class="badge rounded-pill bg-warning bg-opacity-10 text-warning-emphasis border border-warning border-opacity-25 status-badge" th:if="${appt.status == 'Pending'}">
                                    <i class="bi bi-hourglass-split me-1"></i>Pending
                                </span>
                                <span class="badge rounded-pill bg-success bg-opacity-10 text-success border border-success border-opacity-25 status-badge" th:if="${appt.status == 'Confirmed'}">
                                    <i class="bi bi-check-circle-fill me-1"></i>Confirmed
                                </span>
                                <span class="badge rounded-pill bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25 status-badge" th:if="${appt.status == 'Cancelled'}">
                                    <i class="bi bi-x-circle-fill me-1"></i>Cancelled
                                </span>
                            </td>
                            
                            <td>
                                <form th:if="${appt.status != 'Cancelled'}" action="/appointments/cancel" method="post" class="m-0">
                                    <input type="hidden" name="appointmentId" th:value="${appt.id}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3 shadow-sm fw-semibold">
                                        <i class="bi bi-x-lg me-1"></i>Cancel
                                    </button>
                                </form>
                                <span th:if="${appt.status == 'Cancelled'}" class="text-muted small fw-semibold">
                                    <i class="bi bi-dash-lg"></i>
                                </span>
                            </td>
                        </tr>
                        
                        <tr th:if="${#lists.isEmpty(appointments)}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-calendar2-x display-4 d-block mb-3 text-light"></i>
                                No appointments found. Your schedule is clear!
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
    </div>

</body>
</html>
